<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 520" role="img" aria-label="Das Doppel als eigenes Spiel: zwei gegen zwei, jedes Paar teilt sich ein Feld.">
  <style>
    .linie{fill:none;stroke:var(--tinte,#16202b);stroke-width:2.4}
    .zone{fill:var(--primaer,#38a4f1);opacity:.08}
    .spieler{fill:var(--primaer,#38a4f1)}
    .gegner{fill:var(--tinte-3,#6b7686)}
    .band{fill:none;stroke:var(--primaer,#38a4f1);stroke-width:2;opacity:.45}
    .bandg{fill:none;stroke:var(--tinte-3,#6b7686);stroke-width:2;opacity:.45}
    .zonetext{fill:var(--primaer-tief,#1568ad);font:700 13px/1 system-ui,'Segoe UI',sans-serif;letter-spacing:1px;text-anchor:middle}
    .subtext{fill:var(--tinte-3,#6b7686);font:600 12px/1 system-ui,'Segoe UI',sans-serif;text-anchor:middle}
  </style>

  <rect class="zone" x="55" y="230" width="190" height="100"/>
  <rect class="linie" x="55" y="40"  width="190" height="190"/>
  <rect class="linie" x="55" y="330" width="190" height="190"/>

  <line class="bandg" x1="112" y1="118" x2="188" y2="150"/>
  <circle class="gegner" cx="112" cy="118" r="9"/>
  <circle class="gegner" cx="188" cy="150" r="9"/>

  <line class="band" x1="112" y1="402" x2="188" y2="434"/>
  <circle class="spieler" cx="112" cy="402" r="9"/>
  <circle class="spieler" cx="188" cy="434" r="9"/>

  <text class="subtext"  x="150" y="66">gegnerisches Paar</text>
  <text class="zonetext" x="150" y="285">2 gegen 2</text>
  <text class="subtext"  x="150" y="505">euer Paar</text>
</svg>
