<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" role="img" aria-label="Den Aufschlag taktisch nutzen: aus der Aufschlagzone verschiedene Zielpunkte im gegnerischen Feld anspielen.">
  <style>
    .linie{fill:none;stroke:var(--tinte,#16202b);stroke-width:2.4}
    .opt{fill:none;stroke:var(--primaer,#38a4f1);stroke-width:1.8}
    .marker{fill:var(--primaer,#38a4f1)}
    .ziel{fill:var(--tinte-3,#6b7686)}
    .zonetext{fill:var(--primaer-tief,#1568ad);font:700 12px/1 system-ui,'Segoe UI',sans-serif;text-anchor:middle}
  </style>
  <defs><marker id="ah" viewBox="0 0 10 10" markerWidth="7" markerHeight="7" refX="6.5" refY="5" orient="auto"><path d="M1,1 L9,5 L1,9 Z" class="marker"/></marker></defs>

  <rect class="linie" x="52" y="42" width="196" height="196"/>

  <line class="opt" x1="150" y1="270" x2="80"  y2="74"  marker-end="url(#ah)"/>
  <line class="opt" x1="150" y1="270" x2="220" y2="74"  marker-end="url(#ah)"/>
  <line class="opt" x1="150" y1="270" x2="150" y2="140" marker-end="url(#ah)"/>
  <line class="opt" x1="150" y1="270" x2="88"  y2="200" marker-end="url(#ah)"/>
  <line class="opt" x1="150" y1="270" x2="212" y2="200" marker-end="url(#ah)"/>

  <circle class="ziel" cx="80"  cy="70"  r="3.5"/>
  <circle class="ziel" cx="220" cy="70"  r="3.5"/>
  <circle class="ziel" cx="150" cy="135" r="3.5"/>
  <circle class="ziel" cx="84"  cy="204" r="3.5"/>
  <circle class="ziel" cx="216" cy="204" r="3.5"/>

  <circle class="marker" cx="150" cy="270" r="6"/>
  <text class="zonetext" x="150" y="289">Aufschlagzone</text>
</svg>
