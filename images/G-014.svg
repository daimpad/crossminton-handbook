<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" role="img" aria-label="Das Beinarbeit-System: von der zentralen Basis in die Ecken ausbrechen und sofort zur Mitte zurückkehren.">
  <style>
    .linie{fill:none;stroke:var(--tinte,#16202b);stroke-width:2.4}
    .raus{fill:none;stroke:var(--primaer,#38a4f1);stroke-width:2.2}
    .zur{fill:none;stroke:var(--tinte-3,#6b7686);stroke-width:1.8;stroke-dasharray:6 5}
    .mk{fill:var(--primaer,#38a4f1)}
    .mkg{fill:var(--tinte-3,#6b7686)}
    .basis{fill:var(--primaer,#38a4f1)}
    .ring{fill:none;stroke:var(--primaer,#38a4f1);stroke-width:1.6;opacity:.5}
    .zt{fill:var(--primaer-tief,#1568ad);font:700 12px/1 system-ui,sans-serif;text-anchor:middle}
    .st{fill:var(--tinte-3,#6b7686);font:600 11px/1 system-ui,sans-serif;text-anchor:middle}
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" markerWidth="7.5" markerHeight="7.5" refX="6.5" refY="5" orient="auto"><path d="M1,1 L9,5 L1,9 Z" class="mk"/></marker>
    <marker id="ag" viewBox="0 0 10 10" markerWidth="7" markerHeight="7" refX="6.5" refY="5" orient="auto"><path d="M1,1 L9,5 L1,9 Z" class="mkg"/></marker>
  </defs>
  <rect class="linie" x="52" y="42" width="196" height="196"/>
  <!-- raus zu zwei Ecken -->
  <path class="raus" d="M150,140 L86,80"   marker-end="url(#ah)"/>
  <path class="raus" d="M150,140 L214,200" marker-end="url(#ah)"/>
  <!-- und zurück zur Mitte -->
  <path class="zur" d="M84,96 C 110,120 120,128 138,138" marker-end="url(#ag)"/>
  <path class="zur" d="M212,184 C 188,164 178,156 162,146" marker-end="url(#ag)"/>
  <circle class="ring" cx="150" cy="140" r="17"/>
  <circle class="basis" cx="150" cy="140" r="8"/>
  <text class="st" x="150" y="120">Basis</text>
  <text class="zt" x="150" y="272">raus zur Ecke — zurück zur Mitte</text>
</svg>
