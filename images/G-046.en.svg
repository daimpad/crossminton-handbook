<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 520" role="img" aria-label="Serving in doubles, simple: from a fixed order one player serves across the neutral zone.">
  <style>
    .linie{fill:none;stroke:var(--tinte,#16202b);stroke-width:2.4}
    .zone{fill:var(--primaer,#38a4f1);opacity:.08}
    .sp{fill:var(--primaer,#38a4f1)}
    .geg{fill:var(--tinte-3,#6b7686)}
    .pf{fill:none;stroke:var(--primaer,#38a4f1);stroke-width:2.6}
    .mk{fill:var(--primaer,#38a4f1)}
    .badge{fill:var(--tinte,#16202b)}
    .bt{fill:var(--flaeche,#fff);font:700 12px/1 system-ui,sans-serif;text-anchor:middle}
    .zt{fill:var(--primaer-tief,#1568ad);font:700 13px/1 system-ui,sans-serif;letter-spacing:.5px;text-anchor:middle}
    .st{fill:var(--tinte-3,#6b7686);font:600 12px/1 system-ui,sans-serif;text-anchor:middle}
  </style>
  <defs><marker id="ah" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="6.5" refY="5" orient="auto"><path d="M1,1 L9,5 L1,9 Z" class="mk"/></marker></defs>
  <rect class="zone" x="55" y="230" width="190" height="100"/>
  <rect class="linie" x="55" y="40"  width="190" height="190"/>
  <rect class="linie" x="55" y="330" width="190" height="190"/>
  <circle class="geg" cx="108" cy="110" r="9"/>
  <circle class="geg" cx="192" cy="140" r="9"/>
  <circle class="sp"  cx="192" cy="440" r="9"/>
  <circle class="sp"  cx="108" cy="410" r="9"/>
  <!-- Aufschlag über die Zone -->
  <path class="pf" d="M108,406 C 96,320 100,190 122,150" marker-end="url(#ah)"/>
  <circle class="badge" cx="150" cy="285" r="12"/>
  <text class="bt" x="150" y="289">1</text>
  <text class="st" x="150" y="66">opposing pair</text>
  <text class="st" x="150" y="505">your pair</text>
  <text class="zt" x="222" y="405">serve</text>
</svg>
