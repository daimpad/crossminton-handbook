<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" role="img" aria-label="Switching seamlessly: the pair moves fluidly between attack and defense.">
  <style>
    .linie{fill:none;stroke:var(--tinte,#16202b);stroke-width:2.4}
    .sp{fill:var(--primaer,#38a4f1)}
    .spg{fill:var(--flaeche,#fff);stroke:var(--primaer,#38a4f1);stroke-width:2.4;opacity:.9}
    .rot{fill:none;stroke:var(--primaer,#38a4f1);stroke-width:2.4}
    .mk{fill:var(--primaer,#38a4f1)}
    .zt{fill:var(--primaer-tief,#1568ad);font:700 12px/1 system-ui,sans-serif;text-anchor:middle}
  </style>
  <defs><marker id="ah" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="6.5" refY="5" orient="auto"><path d="M1,1 L9,5 L1,9 Z" class="mk"/></marker></defs>
  <rect class="linie" x="52" y="42" width="196" height="196"/>
  <!-- fließende Rotation zwischen den Formationen -->
  <path class="rot" d="M118,104 C 170,86 196,120 178,164" marker-end="url(#ah)"/>
  <path class="rot" d="M182,176 C 130,194 104,160 122,116" marker-end="url(#ah)"/>
  <circle class="spg" cx="150" cy="96"  r="10"/>
  <circle class="spg" cx="150" cy="184" r="10"/>
  <circle class="sp"  cx="108" cy="140" r="10"/>
  <circle class="sp"  cx="192" cy="140" r="10"/>
  <text class="zt" x="150" y="272">switch seamlessly</text>
</svg>
