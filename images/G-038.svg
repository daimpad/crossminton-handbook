<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" role="img" aria-label="Angriff im Paar: ein Spieler vorne, der Partner dahinter — die Angriffsformation vorne-hinten.">
  <style>
    .linie{fill:none;stroke:var(--tinte,#16202b);stroke-width:2.4}
    .spieler{fill:var(--primaer,#38a4f1)}
    .band{fill:none;stroke:var(--primaer,#38a4f1);stroke-width:2;opacity:.45}
    .pfeil{fill:none;stroke:var(--tinte-3,#6b7686);stroke-width:2}
    .marker{fill:var(--tinte-3,#6b7686)}
    .zonetext{fill:var(--primaer-tief,#1568ad);font:700 12px/1 system-ui,'Segoe UI',sans-serif;text-anchor:middle}
    .subtext{fill:var(--tinte-3,#6b7686);font:600 12px/1 system-ui,'Segoe UI',sans-serif;text-anchor:middle}
  </style>
  <defs><marker id="ah" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="6.5" refY="5" orient="auto"><path d="M1,1 L9,5 L1,9 Z" class="marker"/></marker></defs>

  <rect class="linie" x="52" y="42" width="196" height="196"/>

  <path class="pfeil" d="M96,180 L96,74" marker-end="url(#ah)"/>
  <text class="subtext" x="96" y="200">Angriff</text>

  <line class="band" x1="168" y1="96" x2="168" y2="190"/>
  <circle class="spieler" cx="168" cy="96"  r="11"/>
  <circle class="spieler" cx="168" cy="190" r="11"/>
  <text class="zonetext" x="210" y="100">vorne</text>
  <text class="subtext"  x="210" y="194">hinten</text>

  <text class="zonetext" x="150" y="272">Angriff: vorne–hinten</text>
</svg>
