<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" role="img" aria-label="Central position: from the center of the field the paths to all four corners are equally short.">
  <style>
    .linie{fill:none;stroke:var(--tinte,#16202b);stroke-width:2.4}
    .reach{fill:none;stroke:var(--primaer,#38a4f1);stroke-width:1.9}
    .marker{fill:var(--primaer,#38a4f1)}
    .eckpkt{fill:var(--tinte-3,#6b7686)}
    .zonetext{fill:var(--primaer-tief,#1568ad);font:700 12px/1 system-ui,'Segoe UI',sans-serif;text-anchor:middle}
    .subtext{fill:var(--tinte-3,#6b7686);font:600 11px/1 system-ui,'Segoe UI',sans-serif;text-anchor:middle}
  </style>
  <defs>
    <marker id="rarw" viewBox="0 0 10 10" markerWidth="7.5" markerHeight="7.5" refX="6.5" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9 Z" class="marker"/>
    </marker>
  </defs>

  <rect class="linie" x="52" y="42" width="196" height="196"/>

  <!-- gleich kurze Wege zu allen vier Ecken -->
  <line class="reach" x1="150" y1="140" x2="80"  y2="70"  marker-end="url(#rarw)"/>
  <line class="reach" x1="150" y1="140" x2="220" y2="70"  marker-end="url(#rarw)"/>
  <line class="reach" x1="150" y1="140" x2="80"  y2="210" marker-end="url(#rarw)"/>
  <line class="reach" x1="150" y1="140" x2="220" y2="210" marker-end="url(#rarw)"/>

  <circle class="eckpkt" cx="72"  cy="62"  r="3.5"/>
  <circle class="eckpkt" cx="228" cy="62"  r="3.5"/>
  <circle class="eckpkt" cx="72"  cy="218" r="3.5"/>
  <circle class="eckpkt" cx="228" cy="218" r="3.5"/>

  <circle class="marker" cx="150" cy="140" r="8"/>
  <text class="zonetext" x="150" y="128">center</text>
  <text class="subtext"  x="150" y="272">equally quick to every corner</text>
</svg>
