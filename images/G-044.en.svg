<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" role="img" aria-label="First steps in doubles: two partners side by side at a comfortable spacing.">
  <style>
    .linie{fill:none;stroke:var(--tinte,#16202b);stroke-width:2.4}
    .sp{fill:var(--primaer,#38a4f1)}
    .band{fill:none;stroke:var(--primaer,#38a4f1);stroke-width:2.2;opacity:.5}
    .st{fill:var(--tinte-3,#6b7686);font:600 12px/1 system-ui,sans-serif;text-anchor:middle}
    .zt{fill:var(--primaer-tief,#1568ad);font:700 12px/1 system-ui,sans-serif;text-anchor:middle}
  </style>
  <rect class="linie" x="52" y="42" width="196" height="196"/>
  <line class="band" x1="108" y1="140" x2="192" y2="140"/>
  <circle class="sp" cx="108" cy="140" r="11"/>
  <circle class="sp" cx="192" cy="140" r="11"/>
  <text class="st" x="150" y="172">comfortable spacing</text>
  <text class="zt" x="150" y="272">first steps as a pair</text>
</svg>
