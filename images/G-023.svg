<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 520" role="img" aria-label="Das Spielziel: den Speeder über die Passierzone ins gegnerische Feld spielen.">
  <style>
    .linie{fill:none;stroke:var(--tinte,#16202b);stroke-width:2.4}
    .zone{fill:var(--primaer,#38a4f1);opacity:.08}
    .traj{fill:none;stroke:var(--primaer,#38a4f1);stroke-width:2.8}
    .marker{fill:var(--primaer,#38a4f1)}
    .ring{fill:none;stroke:var(--primaer,#38a4f1);stroke-width:2.4}
    .zonetext{fill:var(--primaer-tief,#1568ad);font:700 13px/1 system-ui,'Segoe UI',sans-serif;letter-spacing:1px;text-anchor:middle}
    .subtext{fill:var(--tinte-3,#6b7686);font:600 12px/1 system-ui,'Segoe UI',sans-serif;text-anchor:middle}
  </style>
  <defs>
    <marker id="tarw" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="6.5" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9 Z" class="marker"/>
    </marker>
  </defs>

  <rect class="zone" x="55" y="230" width="190" height="100"/>
  <rect class="linie" x="55" y="40"  width="190" height="190"/>
  <rect class="linie" x="55" y="330" width="190" height="190"/>

  <!-- Flugbahn von deinem Feld über die Zone ins gegnerische Feld -->
  <path class="traj" d="M150,442 C 150,360 96,250 110,132" marker-end="url(#tarw)"/>
  <circle class="marker" cx="150" cy="442" r="6"/>
  <circle class="ring" cx="110" cy="120" r="13"/>

  <text class="subtext"  x="150" y="66">gegnerisches Feld</text>
  <text class="zonetext" x="150" y="285">PASSIERZONE</text>
  <text class="subtext"  x="150" y="505">dein Feld</text>
</svg>
