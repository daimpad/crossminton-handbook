<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 330 582" role="img" aria-label="Bemaßtes Crossminton-Spielfeld: zwei Felder 5,50 mal 5,50 m, Passierzone 12,80 m, Aufschlaglinie 3,00 m von der Vorderlinie.">
  <style>
    .linie{fill:none;stroke:var(--tinte,#16202b);stroke-width:2.4}
    .zone{fill:var(--primaer,#38a4f1);opacity:.08}
    .serve{fill:none;stroke:var(--primaer,#38a4f1);stroke-width:2.4;stroke-dasharray:9 6}
    .dim{fill:none;stroke:var(--tinte-3,#6b7686);stroke-width:1}
    .ext{fill:none;stroke:var(--tinte-3,#6b7686);stroke-width:.8;opacity:.7}
    .arw{fill:none;stroke:var(--tinte-3,#6b7686);stroke-width:1.1}
    .brk{fill:none;stroke:var(--tinte-3,#6b7686);stroke-width:1.1}
    .feldtext{fill:var(--tinte,#16202b);font:700 15px/1 system-ui,'Segoe UI',sans-serif;letter-spacing:1.5px;text-anchor:middle}
    .zonetext{fill:var(--primaer-tief,#1568ad);font:700 13px/1 system-ui,'Segoe UI',sans-serif;letter-spacing:1px;text-anchor:middle}
    .acctext{fill:var(--primaer-tief,#1568ad);font:600 12px/1 system-ui,'Segoe UI',sans-serif;text-anchor:middle}
    .subtext{fill:var(--tinte-3,#6b7686);font:600 11px/1 system-ui,'Segoe UI',sans-serif;text-anchor:middle}
    .dimtext{fill:var(--tinte-3,#6b7686);font:600 12.5px/1 system-ui,'Segoe UI',sans-serif;text-anchor:middle}
  </style>
  <defs>
    <marker id="arw" viewBox="0 0 10 10" markerWidth="8.5" markerHeight="8.5" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M3,2.6 L6.2,5 L3,7.4" class="arw"/>
    </marker>
  </defs>

  <rect class="zone" x="76" y="236" width="190" height="110"/>
  <rect class="linie" x="76" y="46"  width="190" height="190"/>
  <rect class="linie" x="76" y="346" width="190" height="190"/>
  <line class="serve" x1="76" y1="133" x2="266" y2="133"/>
  <line class="serve" x1="76" y1="449" x2="266" y2="449"/>

  <polyline class="brk" points="76,289 96,284 116,294 136,284 156,294 176,284 196,294 216,284 236,294 256,284 266,289"/>
  <polyline class="brk" points="76,298 96,293 116,303 136,293 156,303 176,293 196,303 216,293 236,303 256,293 266,298"/>

  <text class="feldtext" x="171" y="199">SPIELFELD</text>
  <text class="subtext"  x="171" y="93">Aufschlagzone</text>
  <text class="acctext"  x="171" y="128">Aufschlaglinie</text>
  <text class="feldtext" x="171" y="403">SPIELFELD</text>
  <text class="subtext"  x="171" y="497">Aufschlagzone</text>
  <text class="zonetext" x="171" y="268">PASSIERZONE</text>
  <text class="subtext"  x="171" y="315">kein Netz — der Speeder muss hinüber</text>

  <line class="ext" x1="76"  y1="46" x2="76"  y2="26"/>
  <line class="ext" x1="266" y1="46" x2="266" y2="26"/>
  <line class="dim" x1="76"  y1="30" x2="266" y2="30" marker-start="url(#arw)" marker-end="url(#arw)"/>
  <text class="dimtext" x="171" y="21">5,50 m</text>

  <line class="ext" x1="76" y1="46"  x2="46" y2="46"/>
  <line class="ext" x1="76" y1="236" x2="46" y2="236"/>
  <line class="dim" x1="50" y1="46"  x2="50" y2="236" marker-start="url(#arw)" marker-end="url(#arw)"/>
  <text class="dimtext" x="38" y="146" transform="rotate(-90 38 146)">5,50 m</text>

  <line class="ext" x1="76" y1="346" x2="46" y2="346"/>
  <line class="dim" x1="50" y1="236" x2="50" y2="281" marker-start="url(#arw)"/>
  <line class="dim" x1="50" y1="306" x2="50" y2="346" marker-end="url(#arw)"/>
  <polyline class="brk" points="45,281 55,285 45,290 55,294 45,298 55,302 50,306"/>
  <text class="dimtext" x="38" y="296" transform="rotate(-90 38 296)">12,80 m</text>

  <line class="ext" x1="266" y1="133" x2="298" y2="133"/>
  <line class="ext" x1="266" y1="236" x2="298" y2="236"/>
  <line class="dim" x1="292" y1="133" x2="292" y2="236" marker-start="url(#arw)" marker-end="url(#arw)"/>
  <text class="dimtext" x="308" y="188" transform="rotate(-90 308 188)">3,00 m</text>
</svg>
