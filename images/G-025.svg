<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" role="img" aria-label="Länge und Tiefe: einen kurzen Ball an die Vorderlinie oder einen tiefen Ball an die Grundlinie spielen.">
  <style>
    .linie{fill:none;stroke:var(--tinte,#16202b);stroke-width:2.4}
    .ziel{fill:var(--primaer,#38a4f1);opacity:.13}
    .traj{fill:none;stroke:var(--primaer,#38a4f1);stroke-width:2.6}
    .marker{fill:var(--primaer,#38a4f1)}
    .zonetext{fill:var(--primaer-tief,#1568ad);font:700 12px/1 system-ui,'Segoe UI',sans-serif;letter-spacing:.5px;text-anchor:middle}
  </style>
  <defs><marker id="ah" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="6.5" refY="5" orient="auto"><path d="M1,1 L9,5 L1,9 Z" class="marker"/></marker></defs>

  <rect class="ziel" x="52" y="42"  width="196" height="42"/>
  <rect class="ziel" x="52" y="196" width="196" height="42"/>
  <rect class="linie" x="52" y="42" width="196" height="196"/>

  <path class="traj" d="M150,288 C 130,250 118,240 116,213" marker-end="url(#ah)"/>
  <path class="traj" d="M150,288 C 176,215 190,120 186,70" marker-end="url(#ah)"/>
  <circle class="marker" cx="116" cy="213" r="5.5"/>
  <circle class="marker" cx="186" cy="66"  r="5.5"/>

  <text class="zonetext" x="150" y="67">tief — an die Grundlinie</text>
  <text class="zonetext" x="150" y="222">kurz — an die Vorderlinie</text>
</svg>
