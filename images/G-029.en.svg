<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" role="img" aria-label="Setting up the smash: push deep, force the opponent into a high ball, then finish steeply.">
  <style>
    .linie{fill:none;stroke:var(--tinte,#16202b);stroke-width:2.4}
    .pf{fill:none;stroke:var(--primaer,#38a4f1);stroke-width:2.6}
    .lift{fill:none;stroke:var(--tinte-3,#6b7686);stroke-width:2;stroke-dasharray:6 5}
    .mk{fill:var(--primaer,#38a4f1)}
    .mkg{fill:var(--tinte-3,#6b7686)}
    .badge{fill:var(--tinte,#16202b)}
    .bt{fill:var(--flaeche,#fff);font:700 11px/1 system-ui,sans-serif;text-anchor:middle}
    .zt{fill:var(--primaer-tief,#1568ad);font:700 12px/1 system-ui,sans-serif;text-anchor:middle}
    .st{fill:var(--tinte-3,#6b7686);font:600 11px/1 system-ui,sans-serif;text-anchor:middle}
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="6.5" refY="5" orient="auto"><path d="M1,1 L9,5 L1,9 Z" class="mk"/></marker>
    <marker id="ag" viewBox="0 0 10 10" markerWidth="7.5" markerHeight="7.5" refX="6.5" refY="5" orient="auto"><path d="M1,1 L9,5 L1,9 Z" class="mkg"/></marker>
  </defs>
  <rect class="linie" x="52" y="42" width="196" height="196"/>
  <!-- 1: tief drücken -->
  <path class="pf" d="M120,290 L112,74" marker-end="url(#ah)"/>
  <g><circle class="badge" cx="112" cy="70" r="12"/><text class="bt" x="112" y="74">1</text></g>
  <text class="st" x="112" y="250">push deep</text>
  <!-- 2: erzwungener hoher Ball -->
  <path class="lift" d="M132,86 C 170,110 176,150 170,176" marker-end="url(#ag)"/>
  <g><circle class="badge" cx="176" cy="188" r="12"/><text class="bt" x="176" y="192">2</text></g>
  <!-- 3: Smash -->
  <path class="pf" d="M176,120 L214,210" marker-end="url(#ah)"/>
  <g><circle class="badge" cx="196" cy="120" r="12"/><text class="bt" x="196" y="124">3</text></g>
  <text class="zt" x="150" y="272">push → high → smash</text>
</svg>
