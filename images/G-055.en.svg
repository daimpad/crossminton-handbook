<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 520" role="img" aria-label="Reading and using the wind: the wind pushes the Speeder sideways, so you deliberately aim against the drift.">
  <style>
    .linie{fill:none;stroke:var(--tinte,#16202b);stroke-width:2.4}
    .zone{fill:var(--primaer,#38a4f1);opacity:.08}
    .wind{fill:none;stroke:var(--tinte-3,#6b7686);stroke-width:2;stroke-dasharray:2 6;stroke-linecap:round}
    .traj{fill:none;stroke:var(--primaer,#38a4f1);stroke-width:2.8}
    .mk{fill:var(--primaer,#38a4f1)}
    .mkg{fill:var(--tinte-3,#6b7686)}
    .ring{fill:none;stroke:var(--primaer,#38a4f1);stroke-width:2.2}
    .zt{fill:var(--primaer-tief,#1568ad);font:700 13px/1 system-ui,sans-serif;text-anchor:middle}
    .st{fill:var(--tinte-3,#6b7686);font:600 12px/1 system-ui,sans-serif;text-anchor:middle}
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="6.5" refY="5" orient="auto"><path d="M1,1 L9,5 L1,9 Z" class="mk"/></marker>
    <marker id="aw" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="6" refY="5" orient="auto"><path d="M1,1 L9,5 L1,9 Z" class="mkg"/></marker>
  </defs>
  <rect class="zone" x="55" y="230" width="190" height="100"/>
  <rect class="linie" x="55" y="40"  width="190" height="190"/>
  <rect class="linie" x="55" y="330" width="190" height="190"/>
  <!-- Wind weht nach rechts -->
  <line class="wind" x1="40" y1="130" x2="150" y2="130" marker-end="url(#aw)"/>
  <line class="wind" x1="40" y1="280" x2="150" y2="280" marker-end="url(#aw)"/>
  <line class="wind" x1="40" y1="430" x2="150" y2="430" marker-end="url(#aw)"/>
  <text class="st" x="86" y="500">Wind →</text>
  <!-- Ziel liegt rechts; du zielst nach links gegen die Drift -->
  <path class="traj" d="M150,440 C 118,330 104,180 128,120" marker-end="url(#ah)"/>
  <circle class="ring" cx="188" cy="110" r="12"/>
  <text class="st" x="200" y="92">Target</text>
  <text class="zt" x="150" y="290">aim against the drift</text>
</svg>
