<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 300" role="img" aria-label="Umpire hand signals: IN, OUT, timeout, let, change of ends and serve fault as an overview.">
  <style>
    .sym{fill:none;stroke:var(--primaer,#38a4f1);stroke-width:2.6;stroke-linecap:round}
    .ink{fill:none;stroke:var(--tinte,#16202b);stroke-width:2.6;stroke-linecap:round}
    .mk{fill:var(--primaer,#38a4f1)}
    .dot{fill:var(--primaer,#38a4f1)}
    .foot{fill:var(--tinte,#16202b);opacity:.6}
    .cap{fill:var(--tinte-2,#5a6675);font:600 12px/1 system-ui,sans-serif;text-anchor:middle}
    .rahmen{fill:none;stroke:var(--linie-stark,#dae3ee);stroke-width:1.2}
  </style>
  <defs><marker id="ah" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="6.5" refY="5" orient="auto"><path d="M1,1 L9,5 L1,9 Z" class="mk"/></marker></defs>

  <!-- IN -->
  <rect class="rahmen" x="12" y="20" width="104" height="112" rx="10"/>
  <line class="sym" x1="64" y1="44" x2="64" y2="86" marker-end="url(#ah)"/>
  <circle class="dot" cx="64" cy="96" r="5"/>
  <text class="cap" x="64" y="120">IN — in the field</text>

  <!-- OUT -->
  <rect class="rahmen" x="128" y="20" width="104" height="112" rx="10"/>
  <line class="ink" x1="170" y1="46" x2="170" y2="96"/>
  <line class="sym" x1="176" y1="72" x2="214" y2="72" marker-end="url(#ah)"/>
  <text class="cap" x="180" y="120">OUT — beside it</text>

  <!-- Auszeit (T) -->
  <rect class="rahmen" x="244" y="20" width="104" height="112" rx="10"/>
  <line class="sym" x1="274" y1="52" x2="322" y2="52"/>
  <line class="sym" x1="298" y1="52" x2="298" y2="96"/>
  <text class="cap" x="296" y="120">Timeout (T)</text>

  <!-- Wiederholung -->
  <rect class="rahmen" x="12" y="150" width="104" height="112" rx="10"/>
  <path class="sym" d="M64,182 A 20 20 0 1 1 47,216" marker-end="url(#ah)"/>
  <text class="cap" x="64" y="250">Let</text>

  <!-- Seitenwechsel -->
  <rect class="rahmen" x="128" y="150" width="104" height="112" rx="10"/>
  <line class="sym" x1="158" y1="192" x2="204" y2="192" marker-end="url(#ah)"/>
  <line class="sym" x1="202" y1="214" x2="156" y2="214" marker-end="url(#ah)"/>
  <text class="cap" x="180" y="250">Change of ends</text>

  <!-- Aufschlagfehler -->
  <rect class="rahmen" x="244" y="150" width="104" height="112" rx="10"/>
  <line class="ink" x1="266" y1="204" x2="330" y2="204"/>
  <ellipse class="foot" cx="292" cy="198" rx="7" ry="13"/>
  <ellipse class="foot" cx="306" cy="206" rx="7" ry="13"/>
  <text class="cap" x="296" y="250">Serve fault</text>
</svg>
