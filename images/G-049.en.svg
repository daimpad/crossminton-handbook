<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" role="img" aria-label="The pair as a system: both partners cover the whole field together, connected and coordinated.">
  <style>
    .linie{fill:none;stroke:var(--tinte,#16202b);stroke-width:2.4}
    .deck{fill:var(--primaer,#38a4f1);opacity:.07}
    .sp{fill:var(--primaer,#38a4f1)}
    .band{fill:none;stroke:var(--primaer,#38a4f1);stroke-width:2.6;opacity:.55}
    .pf{fill:none;stroke:var(--primaer,#38a4f1);stroke-width:2.2}
    .mk{fill:var(--primaer,#38a4f1)}
    .zt{fill:var(--primaer-tief,#1568ad);font:700 12px/1 system-ui,sans-serif;text-anchor:middle}
  </style>
  <defs><marker id="ah" viewBox="0 0 10 10" markerWidth="7.5" markerHeight="7.5" refX="6.5" refY="5" orient="auto"><path d="M1,1 L9,5 L1,9 Z" class="mk"/></marker></defs>
  <rect class="deck" x="52" y="42" width="196" height="196"/>
  <rect class="linie" x="52" y="42" width="196" height="196"/>
  <line class="band" x1="112" y1="150" x2="188" y2="150"/>
  <circle class="sp" cx="112" cy="150" r="11"/>
  <circle class="sp" cx="188" cy="150" r="11"/>
  <path class="pf" d="M104,124 L78,92"  marker-end="url(#ah)"/>
  <path class="pf" d="M196,124 L222,92" marker-end="url(#ah)"/>
  <path class="pf" d="M112,178 L92,208" marker-end="url(#ah)"/>
  <path class="pf" d="M188,178 L208,208" marker-end="url(#ah)"/>
  <text class="zt" x="150" y="272">as one system — the whole field</text>
</svg>
