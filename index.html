<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Crossminton-Handbuch</title>
  <meta name="description" content="Clientseitige, mobil-orientierte Lernapp für Crossminton: Bausteine, Pfade, Fortschritt — alles lokal im Browser.">
  <meta name="theme-color" content="#f5f9fd">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏸</text></svg>">
  <link rel="stylesheet" href="css/schriften.css">
  <link rel="stylesheet" href="css/app.css">

  <!-- Thema vor dem ersten Anstrich setzen (kein Flackern): liest die
       gespeicherte Einstellung und erzwingt hell/dunkel; 'auto' folgt dem OS.
       Muss inline und synchron laufen, da Module verzögert geladen werden. -->
  <script>
    (function () {
      try {
        var z = JSON.parse(localStorage.getItem('crossminton.zustand.v1') || '{}');
        var thema = z && z.einstellungen && z.einstellungen.thema;
        if (thema === 'hell' || thema === 'dunkel') document.documentElement.dataset.theme = thema;
        var dunkel = thema === 'dunkel' || (thema !== 'hell' && window.matchMedia
          && window.matchMedia('(prefers-color-scheme: dark)').matches);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', dunkel ? '#0f151c' : '#f5f9fd');
      } catch (e) {}
    })();
  </script>

  <!-- Modul-Graph vorab laden: Ohne diese Hinweise entdeckt der Browser die
       ES-Module erst nacheinander im Import-Wasserfall (app.js → Ansichten →
       Engine → Daten). Fällt dabei EINE Anfrage aus (kurzer CDN-/Netz-Aussetzer,
       in Firefox häufiger sichtbar), lädt die App gar nicht. modulepreload holt
       den ganzen Graphen sofort parallel und macht das Laden robust. -->
  <link rel="modulepreload" href="js/app.js">
  <link rel="modulepreload" href="js/i18n.js">
  <link rel="modulepreload" href="js/oberflaeche.js">
  <link rel="modulepreload" href="js/zustand.js">
  <link rel="modulepreload" href="js/daten.js">
  <link rel="modulepreload" href="js/graph.js">
  <link rel="modulepreload" href="js/fortschritt.js">
  <link rel="modulepreload" href="js/pfade.js">
  <link rel="modulepreload" href="js/aktionen.js">
  <link rel="modulepreload" href="js/ansichten/willkommen.js">
  <link rel="modulepreload" href="js/ansichten/heim.js">
  <link rel="modulepreload" href="js/ansichten/onboarding.js">
  <link rel="modulepreload" href="js/ansichten/pfad.js">
  <link rel="modulepreload" href="js/ansichten/baustein.js">
  <link rel="modulepreload" href="js/ansichten/training.js">
  <link rel="modulepreload" href="js/ansichten/regeln.js">
  <link rel="modulepreload" href="js/ansichten/info.js">
  <link rel="modulepreload" href="js/ansichten/profil.js">
  <link rel="modulepreload" href="js/ansichten/zielwahl.js">
</head>
<body>
  <header class="kopf">
    <div class="kopf-innen">
      <a class="marke" href="#/">
        <img class="marke-logo" src="assets/images/speeder.svg" alt="" width="32" height="32">
        <span class="marke-text">Crossminton-Handbuch</span>
      </a>
      <div class="kopf-rechts">
        <button class="hamburger" id="hamburger" aria-haspopup="true" aria-expanded="false" aria-controls="hauptmenue" aria-label="Menü">
          <i class="fa-solid fa-bars" aria-hidden="true"></i>
        </button>
        <div class="sprach-anzeige" id="sprach-anzeige">
          <button class="sprach-knopf" id="sprach-knopf" aria-expanded="false" aria-controls="sprach-liste" aria-label="Sprache">
            <span class="sprach-globus" aria-hidden="true">🌐</span>
          </button>
          <ul class="sprach-liste" id="sprach-liste" hidden></ul>
        </div>
      </div>
    </div>
  </header>

  <main id="ansicht" tabindex="-1"></main>

  <!-- Screenreader-Ansagen (Quittierungen, Meilensteine): visuell versteckt, höflich vorgelesen. -->
  <div id="ansage" class="nur-sr" aria-live="polite" aria-atomic="true"></div>

  <nav class="fussnav" aria-label="Hauptnavigation">
    <a href="#/" data-nav="lernen">
      <i class="fa-solid fa-house" aria-hidden="true"></i>
      <span class="nav-text">Lernen</span>
    </a>
    <a href="#/training" data-nav="training">
      <i class="fa-solid fa-table-tennis-paddle-ball" aria-hidden="true"></i>
      <span class="nav-text">Training</span>
    </a>
    <a href="#/profil" data-nav="profil">
      <i class="fa-solid fa-user" aria-hidden="true"></i>
      <span class="nav-text">Profil</span>
    </a>
    <button type="button" class="fussnav-mehr" id="mehr-knopf" data-nav="mehr" aria-haspopup="true" aria-expanded="false" aria-controls="hauptmenue">
      <i class="fa-solid fa-bars" aria-hidden="true"></i>
      <span class="nav-text">Mehr</span>
    </button>
  </nav>

  <div class="menue" id="hauptmenue" hidden>
    <div class="menue-schleier" data-menue-zu></div>
    <nav class="menue-lade" aria-label="Menü">
      <div class="menue-kopf">
        <span class="menue-titel">Menü</span>
        <button class="menue-schliessen" data-menue-zu aria-label="Menü schließen">
          <i class="fa-solid fa-xmark" aria-hidden="true"></i>
        </button>
      </div>
      <a href="#/" data-nav="lernen" class="menue-punkt">
        <i class="fa-solid fa-house" aria-hidden="true"></i>
        <span class="nav-text">Lernen</span>
      </a>
      <a href="#/training" data-nav="training" class="menue-punkt">
        <i class="fa-solid fa-table-tennis-paddle-ball" aria-hidden="true"></i>
        <span class="nav-text">Training</span>
      </a>
      <a href="#/regeln" data-nav="regeln" class="menue-punkt">
        <i class="fa-solid fa-book-open" aria-hidden="true"></i>
        <span class="nav-text">Regeln</span>
      </a>
      <a href="#/ueber" data-nav="ueber" class="menue-punkt">
        <i class="fa-solid fa-compass" aria-hidden="true"></i>
        <span class="nav-text">Über</span>
      </a>
      <a href="#/mitmachen" data-nav="mitmachen" class="menue-punkt">
        <i class="fa-solid fa-comments" aria-hidden="true"></i>
        <span class="nav-text">Mitmachen</span>
      </a>
      <a href="#/profil" data-nav="profil" class="menue-punkt">
        <i class="fa-solid fa-user" aria-hidden="true"></i>
        <span class="nav-text">Profil</span>
      </a>
      <span class="menue-trenner" role="separator"></span>
      <a href="#/impressum" data-footer="impressum" class="menue-punkt">
        <i class="fa-solid fa-scale-balanced" aria-hidden="true"></i>
        <span class="nav-text">Impressum</span>
      </a>
      <a href="#/datenschutz" data-footer="datenschutz" class="menue-punkt">
        <i class="fa-solid fa-shield-halved" aria-hidden="true"></i>
        <span class="nav-text">Datenschutz</span>
      </a>
    </nav>
  </div>

  <div id="dialog-wurzel"></div>

  <noscript>
    <div style="max-width:44rem;margin:2rem auto;padding:0 1rem;font-family:system-ui,sans-serif">
      Diese Lernapp läuft vollständig im Browser und benötigt JavaScript.
    </div>
  </noscript>

  <script type="module" src="js/app.js"></script>

  <!-- Auffangnetz ohne Module: Scheitert das Laden der ES-Module (Netz-/Cache-
       Störung, CDN-Aussetzer, sehr alter Browser), bleibt keine leere Seite
       zurück. Ein EINMALIGER automatischer Neuversuch (über sessionStorage
       gegen Endlosschleifen abgesichert) fängt kurze Aussetzer ab; erst wenn
       auch der scheitert, erscheint die Meldung mit Neu-laden-Knopf. -->
  <script>
    (function () {
      window.addEventListener('load', function () {
        window.setTimeout(function () {
          var ziel = document.getElementById('ansicht');
          if (!ziel) return;
          if (ziel.childElementCount > 0) {
            try { sessionStorage.removeItem('modul-neuversuch'); } catch (e) {}
            return;
          }
          try {
            if (!sessionStorage.getItem('modul-neuversuch')) {
              sessionStorage.setItem('modul-neuversuch', '1');
              window.location.reload();
              return;
            }
          } catch (e) {}
          ziel.innerHTML =
            '<div class="karte">' +
            '<h1>Die App konnte nicht vollständig geladen werden</h1>' +
            '<p class="leise">Beim Laden der Skript-Module ist etwas schiefgegangen — meist eine kurze Netzwerk- oder Cache-Störung. Ein Neuladen behebt das in aller Regel.</p>' +
            '<button class="knopf knopf-primaer" onclick="window.location.reload()">Neu laden</button>' +
            '</div>';
        }, 3000);
      });
    })();
  </script>
</body>
</html>
