<!doctype html>
<html lang="de">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Crossminton-Handbuch</title>
  <meta name="description" content="Clientseitige, mobil-orientierte Lernapp für Crossminton: Bausteine, Pfade, Fortschritt — alles lokal im Browser.">
  <meta name="theme-color" content="#f5f9fd">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏸</text></svg>">
  <link rel="stylesheet" href="css/schriften.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <header class="kopf">
    <div class="kopf-innen">
      <a class="marke" href="#/">
        <img class="marke-logo" src="assets/images/speeder.svg" alt="" width="32" height="32">
        <span class="marke-text">Crossminton-Handbuch</span>
      </a>
      <div class="kopf-rechts">
        <button class="hamburger" id="hamburger" aria-haspopup="true" aria-expanded="false" aria-controls="hauptmenue" aria-label="Menü">

        <div class="sprach-anzeige" id="sprach-anzeige">
          <button class="sprach-knopf" id="sprach-knopf" aria-haspopup="true" aria-expanded="false" aria-controls="sprach-liste" aria-label="Sprache">

          </button>
          <ul class="sprach-liste" id="sprach-liste" hidden></ul>
        </div>
      </div>
    </div>
  </header>

  <main id="ansicht" tabindex="-1"></main>

  <footer class="app-footer">
    <nav class="footer-links" aria-label="Rechtliches">
      <a href="#/impressum" data-footer="impressum">Impressum</a>
      <a href="#/datenschutz" data-footer="datenschutz">Datenschutz</a>
    </nav>
    <a class="footer-github" id="footer-github" href="https://github.com/daimpad/crossminton-handbook/" target="_blank" rel="noopener noreferrer" aria-label="Projekt auf GitHub">
      <svg class="footer-github-logo" viewBox="0 0 16 16" width="18" height="18" aria-hidden="true" focusable="false"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      <span class="footer-version" id="footer-version"></span>
    </a>
  </footer>

  <nav class="fussnav" aria-label="Hauptnavigation">
    <a href="#/" data-nav="lernen">
      <i class="fa-solid fa-house" aria-hidden="true"></i>
      <span class="nav-text">Lernen</span>
    </a>
    <a href="#/training" data-nav="training">
      <i class="fa-solid fa-table-tennis-paddle-ball" aria-hidden="true"></i>
      <span class="nav-text">Training</span>
    </a>
    <a href="#/profil" data-nav="profil">
      <i class="fa-solid fa-user" aria-hidden="true"></i>
      <span class="nav-text">Profil</span>
    </a>
    <button type="button" class="fussnav-mehr" id="mehr-knopf" data-nav="mehr" aria-haspopup="true" aria-expanded="false" aria-controls="hauptmenue">
      <i class="fa-solid fa-bars" aria-hidden="true"></i>
      <span class="nav-text">Mehr</span>
    </button>
  </nav>

  <div class="menue" id="hauptmenue" hidden>
    <div class="menue-schleier" data-menue-zu></div>
    <nav class="menue-lade" aria-label="Menü">
      <div class="menue-kopf">
        <span class="menue-titel">Menü</span>
        <button class="menue-schliessen" data-menue-zu aria-label="Menü schließen">
          <i class="fa-solid fa-xmark" aria-hidden="true"></i>
        </button>
      </div>
      <a href="#/" data-nav="lernen" class="menue-punkt">
        <i class="fa-solid fa-house" aria-hidden="true"></i>
        <span class="nav-text">Lernen</span>
      </a>
      <a href="#/training" data-nav="training" class="menue-punkt">
        <i class="fa-solid fa-table-tennis-paddle-ball" aria-hidden="true"></i>
        <span class="nav-text">Training</span>
      </a>
      <a href="#/regeln" data-nav="regeln" class="menue-punkt">
        <i class="fa-solid fa-book-open" aria-hidden="true"></i>
        <span class="nav-text">Regeln</span>
      </a>
      <a href="#/ueber" data-nav="ueber" class="menue-punkt">
        <i class="fa-solid fa-compass" aria-hidden="true"></i>
        <span class="nav-text">Über</span>
      </a>
      <a href="#/mitmachen" data-nav="mitmachen" class="menue-punkt">
        <i class="fa-solid fa-comments" aria-hidden="true"></i>
        <span class="nav-text">Mitmachen</span>
      </a>
      <a href="#/profil" data-nav="profil" class="menue-punkt">
        <i class="fa-solid fa-user" aria-hidden="true"></i>
        <span class="nav-text">Profil</span>
      </a>
      <span class="menue-trenner" role="separator"></span>
      <a href="#/impressum" data-footer="impressum" class="menue-punkt">
        <i class="fa-solid fa-scale-balanced" aria-hidden="true"></i>
        <span class="nav-text">Impressum</span>
      </a>
      <a href="#/datenschutz" data-footer="datenschutz" class="menue-punkt">
        <i class="fa-solid fa-shield-halved" aria-hidden="true"></i>
        <span class="nav-text">Datenschutz</span>
      </a>
      <span class="menue-trenner" role="separator"></span>
      <a href="https://github.com/daimpad/crossminton-handbook/blob/main/README.md" target="_blank" rel="noopener noreferrer" data-doc="readme" class="menue-punkt">
        <i class="fa-solid fa-circle-info" aria-hidden="true"></i>
        <span class="nav-text">Über das Projekt</span>
        <i class="fa-solid fa-arrow-up-right-from-square menue-extern" aria-hidden="true"></i>
      </a>
      <a href="https://github.com/daimpad/crossminton-handbook/blob/main/docs/TECHNICAL.md" target="_blank" rel="noopener noreferrer" data-doc="technical" class="menue-punkt">
        <i class="fa-solid fa-code" aria-hidden="true"></i>
        <span class="nav-text">Technische Doku</span>
        <i class="fa-solid fa-arrow-up-right-from-square menue-extern" aria-hidden="true"></i>
      </a>
    </nav>
  </div>

  <div id="dialog-wurzel"></div>

  <noscript>
    <div style="max-width:44rem;margin:2rem auto;padding:0 1rem;font-family:system-ui,sans-serif">
      Diese Lernapp läuft vollständig im Browser und benötigt JavaScript.
    </div>
  </noscript>

  <script type="module" src="js/app.js"></script>

  <!-- Auffangnetz ohne Module: Scheitert das Laden der ES-Module (Netz-/Cache-
       Störung, sehr alter Browser), bleibt keine leere Seite zurück, sondern
       eine Meldung mit Neu-laden-Knopf. Statisch in der Quellsprache. -->
  <script>
    (function () {
      window.addEventListener('load', function () {
        window.setTimeout(function () {
          var ziel = document.getElementById('ansicht');
          if (!ziel || ziel.childElementCount > 0) return;
          ziel.innerHTML =
            '<div class="karte">' +
            '<h1>Die App konnte nicht vollständig geladen werden</h1>' +
            '<p class="leise">Beim Laden der Skript-Module ist etwas schiefgegangen — meist eine kurze Netzwerk- oder Cache-Störung.</p>' +
            '<button class="knopf knopf-primaer" onclick="window.location.reload()">Neu laden</button>' +
            '</div>';
        }, 3000);
      });
    })();
  </script>
</body>
</html>
