<!doctype html>

  <meta name="theme-color" content="#f5f9fd">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏸</text></svg>">
  <link rel="stylesheet" href="css/schriften.css">
  <link rel="stylesheet" href="css/app.css">

  <!-- Thema vor dem ersten Anstrich setzen (kein Flackern): liest die
       gespeicherte Einstellung und erzwingt hell/dunkel; 'auto' folgt dem OS.
       Muss inline und synchron laufen, da Module verzögert geladen werden. -->
  <script>
    (function () {
      try {
        var z = JSON.parse(localStorage.getItem('crossminton.zustand.v1') || '{}');
        var thema = z && z.einstellungen && z.einstellungen.thema;
        if (thema === 'hell' || thema === 'dunkel') document.documentElement.dataset.theme = thema;
        var dunkel = thema === 'dunkel' || (thema !== 'hell' && window.matchMedia
          && window.matchMedia('(prefers-color-scheme: dark)').matches);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', dunkel ? '#0f151c' : '#f5f9fd');
      } catch (e) {}
    })();
  </script>

  <!-- Modul-Graph vorab laden: Ohne diese Hinweise entdeckt der Browser die
       ES-Module erst nacheinander im Import-Wasserfall (app.js → Ansichten →
       Engine → Daten). Fällt dabei EINE Anfrage aus (kurzer CDN-/Netz-Aussetzer,
       in Firefox häufiger sichtbar), lädt die App gar nicht. modulepreload holt
       den ganzen Graphen sofort parallel und macht das Laden robust. -->
  <link rel="modulepreload" href="js/app.js">
  <link rel="modulepreload" href="js/i18n.js">
  <link rel="modulepreload" href="js/oberflaeche.js">
  <link rel="modulepreload" href="js/zustand.js">
  <link rel="modulepreload" href="js/daten.js">
  <link rel="modulepreload" href="js/graph.js">
  <link rel="modulepreload" href="js/fortschritt.js">
  <link rel="modulepreload" href="js/pfade.js">
  <link rel="modulepreload" href="js/aktionen.js">
  <link rel="modulepreload" href="js/ansichten/willkommen.js">
  <link rel="modulepreload" href="js/ansichten/heim.js">
  <link rel="modulepreload" href="js/ansichten/onboarding.js">
  <link rel="modulepreload" href="js/ansichten/pfad.js">
  <link rel="modulepreload" href="js/ansichten/baustein.js">
  <link rel="modulepreload" href="js/ansichten/training.js">
  <link rel="modulepreload" href="js/ansichten/regeln.js">
  <link rel="modulepreload" href="js/ansichten/info.js">
  <link rel="modulepreload" href="js/ansichten/profil.js">
  <link rel="modulepreload" href="js/ansichten/zielwahl.js">
</head>

  <div id="dialog-wurzel"></div>

  <noscript>
    <div style="max-width:44rem;margin:2rem auto;padding:0 1rem;font-family:system-ui,sans-serif">
      Diese Lernapp läuft vollständig im Browser und benötigt JavaScript.
    </div>
  </noscript>

  <script type="module" src="js/app.js"></script>

  <!-- Auffangnetz ohne Module: Scheitert das Laden der ES-Module (Netz-/Cache-
       Störung, sehr alter Browser), bleibt keine leere Seite zurück. WICHTIG:
       geduldig prüfen statt hart nach 3 s abbrechen — Firefox ohne
       modulepreload (< 115) lädt den Modul-Graphen im langsameren Import-
       Wasserfall und braucht mit den JSON-Daten spürbar länger als Chrome.
       Wir pollen daher ~12 s (alle 400 ms); erst dann EIN automatischer
       Neuversuch (über sessionStorage gegen Endlosschleifen gesichert), und
       erst wenn auch der leer bleibt, erscheint die Meldung. So schlägt ein
       nur langsamer Ladevorgang nicht mehr fälschlich fehl. -->
  <script>
    (function () {
      var MAX = 30; // 30 × 400 ms ≈ 12 s Geduld, bevor aufgegeben wird
      function geladen() {
        var ziel = document.getElementById('ansicht');
        return ziel && ziel.childElementCount > 0;
      }
      function pruefe(versuch) {
        if (geladen()) {
          try { sessionStorage.removeItem('modul-neuversuch'); } catch (e) {}
          return;
        }
        if (versuch < MAX) {
          window.setTimeout(function () { pruefe(versuch + 1); }, 400);
          return;
        }
        try {
          if (!sessionStorage.getItem('modul-neuversuch')) {
            sessionStorage.setItem('modul-neuversuch', '1');
            window.location.reload();
            return;
          }
        } catch (e) {}
        var ziel = document.getElementById('ansicht');
        if (ziel) ziel.innerHTML =
          '<div class="karte">' +
          '<h1>Die App konnte nicht vollständig geladen werden</h1>' +
          '<p class="leise">Beim Laden der Skript-Module ist etwas schiefgegangen — meist eine kurze Netzwerk- oder Cache-Störung. Ein Neuladen behebt das in aller Regel.</p>' +
          '<button class="knopf knopf-primaer" onclick="window.location.reload()">Neu laden</button>' +
          '</div>';
      }
      window.addEventListener('load', function () { pruefe(0); });
    })();
  </script>
</body>
